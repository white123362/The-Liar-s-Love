        }

            background: #121212;
            padding: 18px;

            color: #f5c842;
        }
        .header .chapter-tag {
            font-size: 11px;
            color: #888;
            background: #1a1a2e;
            padding: 2px 12px;
            border-radius: 20px;
        }
        .clues {
            font-size: 12px;
            color: #888;
            background: #0a0a18;
            padding: 6px 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;

        }

            color: #f5c842;

        }
        .scene {

            border-radius: 14px;
            min-height: 120px;
            font-size: 14px;
            line-height: 1.7;
            border-left: 3px solid #f5c842;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .scene .highlight {
            color: #f5c842;
        }
        .scene .danger {
            color: #ff6b6b;
        }
        .scene .dialogue {
            color: #a8d8ea;
            font-style: italic;
        }
        .scene .location {
            color: #888;
            font-size: 12px;
            border-bottom: 1px dashed #2a2a2a;
            padding-bottom: 6px;
            margin-bottom: 8px;
        }
        .image-container {
            background: #0a0a14;
            border: 1px dashed #2a3a5e;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            margin: 8px 0 12px 0;
        }
        .image-container img {
            max-width: 100%;
            max-height: 180px;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
        }
        .image-container .caption {
            color: #888;
            font-size: 10px;
            margin-top: 4px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 10px 0;
        }
        .option-btn {
            background: #1a1a2e;
            border: 1px solid #2a3a5e;
            color: #eee;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
        }
        .option-btn:hover {
            background: #252545;
            border-color: #f5c842;
        }
        .option-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .message {
            background: #0a0a18;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            color: #a8d8ea;
            border: 1px solid #1a2a3a;
            min-height: 40px;
            margin: 8px 0;
        }
        .message .success {
            color: #4caf50;
            font-weight: bold;
        }
        .message .fail {
            color: #ff6b6b;
            font-weight: bold;
        }
        .btn-next {
            background: #f5c842;
            border: none;
            color: #1a1a2e;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-next:hover {
            background: #ffd966;
        }
        .btn-next:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-reset {
            background: #1a1a2e;
            border: 1px solid #2a2a2a;
            color: #888;
            padding: 8px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: 0.2s;
        }
        .btn-reset:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }
        .hidden {
            display: none;
        }
        .scene-transition {
            animation: fadeSlide 0.4s ease;
        }
        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .ending-badge {
            text-align: center;
            font-size: 40px;
            padding: 10px 0;
        }
        .ending-title {
            text-align: center;
            font-size: 20px;
            color: #f5c842;
            margin: 6px 0;
        }
        .ending-desc {
            text-align: center;
            font-size: 14px;
            color: #aaa;
            padding: 10px;
            line-height: 1.8;
        }
    </style>
</head>

                image: null,

    let state = {
        sceneIdx: 0,
        clues: [],
        gameOver: false,
        ending: null
    };

    const sceneEl = document.getElementById('sceneDisplay');
    const msgEl = document.getElementById('messageDisplay');
    const optEl = document.getElementById('optionsContainer');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const clueCount = document.getElementById('clueCount');
    const chapterTag = document.getElementById('chapterTag');
    const sceneName = document.getElementById('sceneName');
    const imgContainer = document.getElementById('imageContainer');
    const sceneImg = document.getElementById('sceneImage');
    const imgCaption = document.getElementById('imageCaption');

    function renderScene() {
        const s = G.scenes[state.sceneIdx];
        if (!s) return;

        chapterTag.textContent = '第' + s.chapter + '章';
        sceneName.textContent = s.name;
        sceneEl.innerHTML = '<div class="scene-transition">' + s.text + '</div>';

        if (s.image) {
            imgContainer.classList.remove('hidden');
            sceneImg.src = s.image;
            imgCaption.textContent = s.imageCaption || '📱 关键物证';
        } else {
            imgContainer.classList.add('hidden');
        }

        optEl.innerHTML = '';
        if (s.options && s.options.length > 0) {
            s.options.forEach(function(opt, idx) {
                var btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.label;
                btn.dataset.idx = idx;
                btn.addEventListener('click', function() { handleOption(idx); });
                optEl.appendChild(btn);
            });
            nextBtn.disabled = true;
            msgEl.innerHTML = '💡 选择一个选项推进剧情';
        } else {
            if (s.isEndOfChapter) {
                if (s.isEnding) {
                    showEnding();
                    return;
                }
                msgEl.innerHTML = '🎉 <span class="success">章节完成！</span> 点击"继续"进入下一章';
                nextBtn.disabled = false;
                nextBtn.textContent = '▶ 进入下一章';
                nextBtn.onclick = goToNextChapter;
            } else {
                nextBtn.disabled = true;
            }
        }

        clueCount.textContent = state.clues.length;
    }

    function handleOption(idx) {
        var s = G.scenes[state.sceneIdx];
        var opt = s.options[idx];
        if (!opt) return;

        var btns = document.querySelectorAll('.option-btn');
        btns.forEach(function(b) { b.disabled = true; });

        if (opt.clue) {
            if (state.clues.indexOf(opt.clue) === -1) {
                state.clues.push(opt.clue);
                msgEl.innerHTML = '🔍 <span class="success">获得线索：' + opt.clue + '</span>';
            }
        }

        if (opt.next !== undefined) {
            state.sceneIdx = opt.next;
            setTimeout(function() {
                renderScene();
            }, 400);
        }

        clueCount.textContent = state.clues.length;
    }

    function goToNextChapter() {
        var s = G.scenes[state.sceneIdx];
        if (s && s.nextChapter !== undefined) {
            var nextIdx = state.sceneIdx + 1;
            while (nextIdx < G.scenes.length && G.scenes[nextIdx].chapter === s.chapter) {
                nextIdx++;
            }
            if (nextIdx < G.scenes.length) {
                state.sceneIdx = nextIdx;
                renderScene();
            } else {
                showEnding();
            }
        }
        nextBtn.disabled = true;
    }

    function showEnding() {
        var count = state.clues.length;
        var endingIdx = 0;
        if (count >= 6) endingIdx = 0;
        else if (count >= 4) endingIdx = 2;
        else if (count >= 2) endingIdx = 1;
        else endingIdx = 3;

        var e = G.endings[endingIdx];
        state.ending = e;
        state.gameOver = true;

        sceneEl.innerHTML = '<div class="scene-transition"><div class="ending-badge">' + e.emoji + '</div><div class="ending-title">' + e.title + '</div><div class="ending-desc">' + e.desc + '</div></div>';
        optEl.innerHTML = '';
        msgEl.innerHTML = '🏁 <span class="success">游戏结束</span> 感谢你完成"向日葵之影"';
        nextBtn.disabled = true;
        nextBtn.textContent = '🔚 已完结';
        chapterTag.textContent = '结局';
        sceneName.textContent = '🌻 终章';
        imgContainer.classList.add('hidden');
    }

    function resetGame() {
        state.sceneIdx = 0;
        state.clues = [];
        state.gameOver = false;
        state.ending = null;
        nextBtn.textContent = '▶ 继续';
        nextBtn.onclick = null;
        renderScene();
    }

    renderScene();
    resetBtn.addEventListener('click', resetGame);
</script>
</body>
</html>
